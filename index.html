<style>
  :root{
    --bg:#0A0710;
    --surface:#170F22;
    --surface-2:#1F1530;
    --rink:#2A1B3D;
    --neon:#FF2E9A;
    --cyan:#26F5E0;
    --violet:#B14AFF;
    --amber:#FFC857;
    --text:#F5EDE4;
    --text-dim:#B5A8C4;
    --line: rgba(245,237,228,0.10);
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 700px 400px at 10% -5%, rgba(38,245,224,0.10), transparent 55%),
      radial-gradient(ellipse 700px 400px at 90% 0%, rgba(255,46,154,0.12), transparent 55%),
      radial-gradient(ellipse 900px 600px at 50% 100%, rgba(177,74,255,0.10), transparent 60%),
      repeating-conic-gradient(from 0deg, rgba(255,255,255,0.025) 0deg 90deg, transparent 90deg 180deg) 0 0/64px 64px,
      var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    padding:24px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto;}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .app-icon{
    width:34px;height:34px;border-radius:9px;flex:none;
    box-shadow: 0 0 14px rgba(177,74,255,0.6), 0 0 24px rgba(38,245,224,0.35);
    animation: iconPulse 3.2s ease-in-out infinite;
  }
  @keyframes iconPulse{
    0%,100%{ box-shadow:0 0 14px rgba(177,74,255,0.6), 0 0 24px rgba(38,245,224,0.35); }
    50%{ box-shadow:0 0 20px rgba(255,46,154,0.75), 0 0 34px rgba(38,245,224,0.5); }
  }
  .brand-text{display:flex;flex-direction:column;gap:2px;}
  .brand .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--cyan);
    text-shadow:0 0 8px rgba(38,245,224,0.6);
  }
  h1{
    font-family:'Bungee', cursive;
    font-size:28px;
    margin:0;
    letter-spacing:0.01em;
    color:var(--text);
    text-shadow:
      0 0 8px rgba(255,46,154,0.7),
      0 0 20px rgba(255,46,154,0.4),
      0 0 34px rgba(177,74,255,0.3);
  }
  .session-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--text-dim);text-align:right;
  }
  .session-count b{color:var(--amber);font-weight:600;text-shadow:0 0 8px rgba(255,200,87,0.6);}

  /* Rink */
  .rink-card{
    background:linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid rgba(255,46,154,0.35);
    border-radius:var(--radius);
    padding:22px 18px 18px;
    position:relative;
    overflow:hidden;
    box-shadow:
      0 0 0 1px rgba(38,245,224,0.08) inset,
      0 0 24px rgba(255,46,154,0.18),
      0 0 60px rgba(177,74,255,0.10);
  }
  .rink-card::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at 50% 15%, rgba(38,245,224,0.10), transparent 50%),
      radial-gradient(circle at 50% 85%, rgba(255,46,154,0.08), transparent 55%);
    pointer-events:none;
  }
  .rink-floor{
    position:absolute;left:0;right:0;bottom:0;height:55%;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,46,154,0.07) 0 24px, rgba(38,245,224,0.05) 24px 48px);
    -webkit-mask-image:linear-gradient(to top, black, transparent);
    mask-image:linear-gradient(to top, black, transparent);
    pointer-events:none;
  }
  .rink-svg-wrap{display:flex;justify-content:center;margin-bottom:6px;position:relative;}
  svg{width:100%;max-width:400px;height:auto;display:block;}
  .track-bg{fill:none;stroke:var(--rink);stroke-width:14;}
  .track-progress{fill:none;stroke:var(--neon);stroke-width:14;stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(255,46,154,0.85)) drop-shadow(0 0 14px rgba(177,74,255,0.5));
    transition:stroke-dasharray 0.15s linear;}
  .skater-dot{fill:var(--cyan);filter:drop-shadow(0 0 8px rgba(38,245,224,0.95)) drop-shadow(0 0 16px rgba(38,245,224,0.5));}
  .rink-center{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;pointer-events:none;
  }
  .timer{
    font-family:'IBM Plex Mono',monospace;
    font-size:38px;font-weight:600;letter-spacing:0.02em;
    color:var(--text);
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 10px rgba(245,237,228,0.5), 0 0 22px rgba(255,46,154,0.35);
  }
  .timer-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--cyan);
    margin-top:2px;
    text-shadow:0 0 8px rgba(38,245,224,0.5);
  }

  .controls{display:flex;gap:10px;margin-top:16px;position:relative;}
  button{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;font-size:15px;
    border-radius:12px;
    padding:14px 12px;
    cursor:pointer;
    transition:transform 0.08s ease, filter 0.15s ease, box-shadow 0.15s ease;
  }
  button:active{transform:scale(0.97);}
  button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}
  .btn-primary{
    flex:1.3;
    background:var(--neon);color:#1a0710;border:none;
    box-shadow:0 0 14px rgba(255,46,154,0.55), 0 0 30px rgba(255,46,154,0.25);
  }
  .btn-primary:hover{filter:brightness(1.1);box-shadow:0 0 20px rgba(255,46,154,0.75), 0 0 40px rgba(177,74,255,0.35);}
  .btn-secondary{
    flex:1;
    background:var(--surface-2);color:var(--text);
    border:1px solid rgba(38,245,224,0.35);
  }
  .btn-secondary:hover{filter:brightness(1.25);box-shadow:0 0 12px rgba(38,245,224,0.3);}
  .btn-lap{
    width:100%;margin-top:10px;
    background:var(--cyan);color:#062824;border:none;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.05em;
    box-shadow:0 0 14px rgba(38,245,224,0.5), 0 0 28px rgba(38,245,224,0.2);
  }
  .btn-lap:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none;}
  .btn-lap:hover:not(:disabled){filter:brightness(1.08);box-shadow:0 0 20px rgba(38,245,224,0.7);}

  /* Stats grid */
  .stats{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:10px;margin-top:16px;
  }
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:10px 8px;text-align:center;
  }
  .stat:nth-child(1){border-color:rgba(255,46,154,0.3);}
  .stat:nth-child(2){border-color:rgba(38,245,224,0.3);}
  .stat:nth-child(3){border-color:rgba(177,74,255,0.35);}
  .stat .val{
    font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--text);
    font-variant-numeric:tabular-nums;
  }
  .stat:nth-child(1) .val{color:var(--neon);text-shadow:0 0 8px rgba(255,46,154,0.5);}
  .stat:nth-child(2) .val{color:var(--cyan);text-shadow:0 0 8px rgba(38,245,224,0.5);}
  .stat:nth-child(3) .val{color:var(--violet);text-shadow:0 0 8px rgba(177,74,255,0.5);}
  .stat .lbl{
    font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-top:3px;
  }

  /* Settings */
  .settings{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:14px;padding:10px 14px;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
  }
  .settings label{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:0.04em;
  }
  .settings input{
    width:80px;text-align:right;
    background:var(--surface-2);border:1px solid rgba(177,74,255,0.35);border-radius:8px;
    color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;
    padding:6px 8px;
  }
  .settings input:focus-visible{outline:2px solid var(--cyan);}

  /* History */
  .history{margin-top:28px;}
  .history h2{
    font-family:'Bungee',cursive;font-size:16px;color:var(--text-dim);
    margin:0 0 12px;letter-spacing:0.01em;
  }
  .hist-item{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--surface);border:1px solid rgba(255,46,154,0.18);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;
  }
  .hist-left .date{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);
  }
  .hist-left .summary{font-size:14px;margin-top:2px;color:var(--text);}
  .hist-right{
    font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--neon);text-align:right;
  }
  .hist-del{
    background:none;border:none;color:var(--text-dim);font-size:16px;
    padding:4px 8px;cursor:pointer;margin-left:8px;
  }
  .hist-del:hover{color:var(--neon);}
  .empty{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);
    text-align:center;padding:20px 0;
  }

  @media (prefers-reduced-motion: reduce){
    .track-progress{transition:none;}
    button{transition:none;}
    .app-icon{animation:none;}
  }
</style>
</head>

<script>
(function(){
  // Persistence: prefer a host-provided async storage API (used by the
  // preview sandbox this app was authored in); otherwise fall back to the
  // browser's localStorage so saving/history works anywhere — e.g. when
  // served from GitHub Pages. Same async {set,get,list,delete} contract.
  const storage = (typeof window !== 'undefined' && window.storage) ? window.storage : {
    async set(key, value){ localStorage.setItem(key, value); },
    async get(key){
      const value = localStorage.getItem(key);
      return value == null ? null : { value };
    },
    async list(prefix){
      const keys = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(k && k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    },
    async delete(key){ localStorage.removeItem(key); }
  };

  const timerEl = document.getElementById('timer');
  const timerLabel = document.getElementById('timerLabel');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const resetBtn = document.getElementById('resetBtn');
  const lapBtn = document.getElementById('lapBtn');
  const trackProgress = document.getElementById('trackProgress');
  const skaterDot = document.getElementById('skaterDot');
  const lapLengthInput = document.getElementById('lapLength');
  const statDistance = document.getElementById('statDistance');
  const statAvgLap = document.getElementById('statAvgLap');
  const statBestLap = document.getElementById('statBestLap');
  const sessionCountEl = document.getElementById('sessionCount');
  const historyList = document.getElementById('historyList');

  let running = false;
  let startTime = null;
  let elapsedMs = 0;
  let rafId = null;
  let lapTimes = []; // ms per lap
  let lastLapMark = 0;

  // Ellipse perimeter (Ramanujan approx) for the oval path, radii 170/90
  const rx = 170, ry = 90;
  const h = Math.pow((rx-ry),2) / Math.pow((rx+ry),2);
  const perimeter = Math.PI * (rx+ry) * (1 + (3*h)/(10+Math.sqrt(4-3*h)));

  function fmtTime(ms){
    const totalSec = Math.floor(ms/1000);
    const m = Math.floor(totalSec/60).toString().padStart(2,'0');
    const s = (totalSec%60).toString().padStart(2,'0');
    return m+':'+s;
  }
  function fmtLap(ms){
    if(ms == null) return '—';
    const s = ms/1000;
    return s.toFixed(1)+'s';
  }

  function setDotPosition(fraction){
    // parametric ellipse position for a fraction [0,1) around the loop, start at angle -90 (top)... but visually starting at right (0deg) to match dasharray rotate
    const angle = fraction * 2 * Math.PI;
    const cx = 200, cy = 120;
    const x = cx + rx * Math.cos(angle);
    const y = cy + ry * Math.sin(angle);
    skaterDot.setAttribute('cx', x.toFixed(1));
    skaterDot.setAttribute('cy', y.toFixed(1));
  }

  function tick(){
    if(!running) return;
    elapsedMs = Date.now() - startTime;
    timerEl.textContent = fmtTime(elapsedMs);

    // progress ring reflects progress through current lap (based on avg lap time so far, or idle pulse before first lap)
    let avgLap = lapTimes.length ? (lapTimes.reduce((a,b)=>a+b,0)/lapTimes.length) : null;
    let fraction;
    if(avgLap){
      const sinceLap = elapsedMs - lastLapMark;
      fraction = Math.min((sinceLap/avgLap), 1);
    } else {
      // idle gentle sweep so it doesn't look frozen before first lap logged
      fraction = (elapsedMs % 8000)/8000;
    }
    const pct = fraction*100;
    trackProgress.setAttribute('stroke-dasharray', pct.toFixed(1)+' 100');
    setDotPosition(fraction);

    rafId = requestAnimationFrame(tick);
  }

  function updateStats(){
    const lapLen = parseFloat(lapLengthInput.value) || 0;
    const distance = lapLen * lapTimes.length;
    statDistance.textContent = distance.toFixed(0);
    if(lapTimes.length){
      const avg = lapTimes.reduce((a,b)=>a+b,0)/lapTimes.length;
      statAvgLap.textContent = fmtLap(avg);
      statBestLap.textContent = fmtLap(Math.min(...lapTimes));
    } else {
      statAvgLap.textContent = '—';
      statBestLap.textContent = '—';
    }
    lapBtn.textContent = `Tap on each lap ▸ ${lapTimes.length} lap${lapTimes.length===1?'':'s'}`;
  }

  startBtn.onclick = () => {
    if(!running){
      running = true;
      startTime = Date.now() - elapsedMs;
      if(lapTimes.length === 0) lastLapMark = elapsedMs;
      startBtn.textContent = 'Pause';
      stopBtn.disabled = false;
      resetBtn.disabled = false;
      lapBtn.disabled = false;
      timerLabel.textContent = 'Skating…';
      tick();
    } else {
      running = false;
      cancelAnimationFrame(rafId);
      startBtn.textContent = 'Resume';
      timerLabel.textContent = 'Paused';
    }
  };

  lapBtn.onclick = () => {
    if(!running) return;
    const lapDuration = elapsedMs - lastLapMark;
    lapTimes.push(lapDuration);
    lastLapMark = elapsedMs;
    updateStats();
  };

  resetBtn.onclick = () => {
    running = false;
    cancelAnimationFrame(rafId);
    elapsedMs = 0;
    lapTimes = [];
    lastLapMark = 0;
    timerEl.textContent = '00:00';
    timerLabel.textContent = 'Ready to skate';
    startBtn.textContent = 'Start Session';
    stopBtn.disabled = true;
    resetBtn.disabled = true;
    lapBtn.disabled = true;
    trackProgress.setAttribute('stroke-dasharray','0 100');
    setDotPosition(0);
    updateStats();
  };

  stopBtn.onclick = async () => {
    if(elapsedMs < 1000){ resetBtn.onclick(); return; }
    running = false;
    cancelAnimationFrame(rafId);
    const lapLen = parseFloat(lapLengthInput.value) || 0;
    const session = {
      id: 'session_' + Date.now(),
      date: new Date().toISOString(),
      durationMs: elapsedMs,
      laps: lapTimes.length,
      distance: lapLen * lapTimes.length,
      avgLapMs: lapTimes.length ? lapTimes.reduce((a,b)=>a+b,0)/lapTimes.length : null,
      bestLapMs: lapTimes.length ? Math.min(...lapTimes) : null
    };
    try{
      await storage.set('skate-session:' + session.id, JSON.stringify(session));
    } catch(e){ console.error('Save failed', e); }
    await loadHistory();
    resetBtn.onclick();
  };

  async function loadHistory(){
    try{
      const listResult = await storage.list('skate-session:');
      const keys = (listResult && listResult.keys) ? listResult.keys : [];
      if(keys.length === 0){
        historyList.innerHTML = '<div class="empty">No sessions yet — finish one to see it here.</div>';
        sessionCountEl.textContent = '0';
        return;
      }
      const sessions = [];
      for(const k of keys){
        try{
          const res = await storage.get(k);
          if(res && res.value) sessions.push(JSON.parse(res.value));
        } catch(e){ /* skip missing */ }
      }
      sessions.sort((a,b) => new Date(b.date) - new Date(a.date));
      sessionCountEl.textContent = sessions.length.toString();
      historyList.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'hist-item';
        const dateStr = new Date(s.date).toLocaleDateString(undefined, {month:'short', day:'numeric'});
        const timeStr = new Date(s.date).toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
        div.innerHTML = `
          <div class="hist-left">
            <div class="date">${dateStr} · ${timeStr}</div>
            <div class="summary">${fmtTime(s.durationMs)} · ${s.laps} lap${s.laps===1?'':'s'} · ${s.distance.toFixed(0)}ft</div>
          </div>
          <div class="hist-right">
            ${s.avgLapMs ? 'avg '+fmtLap(s.avgLapMs) : ''}
            <button class="hist-del" data-id="${s.id}" aria-label="Delete session">✕</button>
          </div>
        `;
        historyList.appendChild(div);
      });
      historyList.querySelectorAll('.hist-del').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          try{ await storage.delete('skate-session:' + id); } catch(err){}
          loadHistory();
        });
      });
    } catch(e){
      console.error('History load failed', e);
      historyList.innerHTML = '<div class="empty">Couldn\'t load history.</div>';
    }
  }

  setDotPosition(0);
  updateStats();
  loadHistory();
})();
</script>
</body>
</html>
